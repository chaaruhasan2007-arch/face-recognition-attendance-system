<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FaceTrack — Activity Log</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0f4ff;--surface:#ffffff;--surface2:#f7f9ff;
  --accent:#4361ee;--accent2:#7209b7;--accent3:#06d6a0;
  --danger:#ef4444;--warn:#d97706;--indigo:#4f46e5;
  --text:#1a1f3c;--muted:#6b7280;--border:rgba(67,97,238,0.14);
  --shadow:0 4px 20px rgba(67,97,238,0.09);
  --glow:0 0 18px rgba(67,97,238,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;cursor:default;}
#bg-canvas{position:fixed;inset:0;z-index:0;}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(240,244,255,0.9);}
.logo{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo svg{flex-shrink:0;}
.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-r{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:7px;font-size:0.82rem;font-weight:600;color:var(--muted);text-decoration:none;padding:7px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);transition:all 0.2s;}
.back-btn:hover{color:var(--accent);border-color:rgba(67,97,238,0.3);}

/* PAGE */
.page{position:relative;z-index:10;min-height:100vh;padding:88px 48px 60px;max-width:1100px;margin:0 auto;}
.breadcrumb{font-size:0.75rem;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.breadcrumb a{color:var(--accent);text-decoration:none;}
.page-title{font-size:1.9rem;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:4px;}
.page-sub{font-size:0.88rem;color:var(--muted);margin-bottom:28px;}

/* SUMMARY CHIPS */
.chips{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.chip{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;border:1.5px solid;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.2s;background:var(--surface);}
.chip.all{border-color:var(--border);color:var(--text);}
.chip.all.active,.chip.all:hover{border-color:var(--accent);background:rgba(67,97,238,0.06);color:var(--accent);}
.chip.register{border-color:rgba(6,214,160,0.3);color:#047857;}
.chip.register.active,.chip.register:hover{background:rgba(6,214,160,0.08);}
.chip.attendance{border-color:rgba(67,97,238,0.3);color:var(--accent);}
.chip.attendance.active,.chip.attendance:hover{background:rgba(67,97,238,0.06);}
.chip.override{border-color:rgba(114,9,183,0.3);color:var(--accent2);}
.chip.override.active,.chip.override:hover{background:rgba(114,9,183,0.06);}
.chip.update{border-color:rgba(245,158,11,0.3);color:var(--warn);}
.chip.update.active,.chip.update:hover{background:rgba(245,158,11,0.06);}
.chip.delete{border-color:rgba(239,68,68,0.3);color:var(--danger);}
.chip.delete.active,.chip.delete:hover{background:rgba(239,68,68,0.06);}
.chip.clear{border-color:rgba(107,114,128,0.3);color:var(--muted);}
.chip.login{border-color:rgba(67,97,238,0.3);color:var(--indigo,#4f46e5);}
.chip.login.active,.chip.login:hover{background:rgba(79,70,229,0.06);}
.chip.clear.active,.chip.clear:hover{background:rgba(107,114,128,0.06);}
.chip-count{font-family:'JetBrains Mono',monospace;font-size:0.72rem;background:rgba(0,0,0,0.06);padding:2px 7px;border-radius:100px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.search-box{position:relative;display:flex;align-items:center;}
.search-box svg{position:absolute;left:12px;color:var(--muted);}
.search-inp{padding:10px 14px 10px 38px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-family:'Outfit',sans-serif;font-size:0.88rem;color:var(--text);width:300px;outline:none;transition:border-color 0.2s;}
.search-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,0.1);}
.search-inp::placeholder{color:#b0b9d0;}
.toolbar-right{display:flex;align-items:center;gap:10px;}
.count-lbl{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;font-family:'Outfit',sans-serif;font-size:0.85rem;font-weight:700;border:none;border-radius:9px;cursor:pointer;transition:all 0.25s cubic-bezier(0.23,1,0.32,1);}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid rgba(67,97,238,0.3);}
.btn-outline:hover{background:rgba(67,97,238,0.06);border-color:var(--accent);transform:translateY(-2px);}
.btn-red{background:transparent;color:var(--danger);border:1.5px solid rgba(239,68,68,0.3);}
.btn-red:hover{background:rgba(239,68,68,0.06);border-color:var(--danger);transform:translateY(-2px);}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-group{margin-bottom:28px;}
.tl-date-label{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:8px 0;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.tl-date-label::after{content:'';flex:1;height:1px;background:var(--border);}

.tl-entry{display:flex;align-items:flex-start;gap:16px;padding:14px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow);transition:all 0.2s;animation:fadeIn 0.3s ease;}
.tl-entry:hover{border-color:rgba(67,97,238,0.25);transform:translateX(3px);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.tl-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.tl-icon.REGISTER {background:rgba(6,214,160,0.12);color:#047857;}
.tl-icon.ATTENDANCE{background:rgba(67,97,238,0.10);color:var(--accent);}
.tl-icon.OVERRIDE  {background:rgba(114,9,183,0.10);color:var(--accent2);}
.tl-icon.UPDATE    {background:rgba(245,158,11,0.10);color:var(--warn);}
.tl-icon.DELETE    {background:rgba(239,68,68,0.08);color:var(--danger);}
.tl-icon.CLEAR     {background:rgba(107,114,128,0.08);color:var(--muted);}
.tl-icon.LOGIN     {background:rgba(79,70,229,0.10);color:#4f46e5;}

.tl-body{flex:1;min-width:0;}
.tl-action-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.tl-badge{font-size:0.62rem;font-weight:700;letter-spacing:1.5px;padding:2px 9px;border-radius:100px;text-transform:uppercase;}
.tl-badge.REGISTER {background:rgba(6,214,160,0.12);color:#047857;}
.tl-badge.ATTENDANCE{background:rgba(67,97,238,0.10);color:var(--accent);}
.tl-badge.OVERRIDE  {background:rgba(114,9,183,0.10);color:var(--accent2);}
.tl-badge.UPDATE    {background:rgba(245,158,11,0.10);color:var(--warn);}
.tl-badge.DELETE    {background:rgba(239,68,68,0.08);color:var(--danger);}
.tl-badge.CLEAR     {background:rgba(107,114,128,0.08);color:var(--muted);}
.tl-badge.LOGIN     {background:rgba(79,70,229,0.10);color:#4f46e5;}
.tl-details{font-size:0.9rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-time{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted);flex-shrink:0;margin-left:auto;padding-top:2px;}

/* Action icons SVG helper classes — done inline */

/* Empty / loading */
.empty-state{text-align:center;padding:80px;color:var(--muted);}
.empty-state svg{margin:0 auto 16px;display:block;}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(67,97,238,0.2);border-radius:4px;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<nav class="topbar">
  <a href="/" class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4361ee"/><stop offset="100%" stop-color="#7209b7"/></linearGradient></defs><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>Face<span>Track</span></a>
  <div class="nav-r">
    <a href="/menu" class="back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Menu
    </a>
  </div>
</nav>

<div class="page">
  <div class="breadcrumb"><a href="/">Home</a><span>›</span><a href="/menu">Menu</a><span>›</span>Activity Log</div>
  <div class="page-title">Activity Log</div>
  <div class="page-sub">Complete history of all system actions with timestamps</div>

  <!-- Action filter chips -->
  <div class="chips" id="chips">
    <div class="chip all active" onclick="setFilter('',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      All <span class="chip-count" id="cnt-all">0</span>
    </div>
    <div class="chip register" onclick="setFilter('REGISTER',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Register <span class="chip-count" id="cnt-register">0</span>
    </div>
    <div class="chip attendance" onclick="setFilter('ATTENDANCE',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Attendance <span class="chip-count" id="cnt-attendance">0</span>
    </div>
    <div class="chip override" onclick="setFilter('OVERRIDE',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Override <span class="chip-count" id="cnt-override">0</span>
    </div>
    <div class="chip update" onclick="setFilter('UPDATE',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Update <span class="chip-count" id="cnt-update">0</span>
    </div>
    <div class="chip delete" onclick="setFilter('DELETE',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      Delete <span class="chip-count" id="cnt-delete">0</span>
    </div>
    <div class="chip login" onclick="setFilter('LOGIN',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Login <span class="chip-count" id="cnt-login">0</span>
    </div>
<div class="chip clear" onclick="setFilter('CLEAR',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.49"/></svg>
      Clear <span class="chip-count" id="cnt-clear">0</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-inp" id="search-inp" type="text" placeholder="Search actions or details…" oninput="renderLog()"/>
    </div>
    <div class="toolbar-right">
      <span class="count-lbl" id="showing-lbl">— entries</span>
      <button class="btn btn-outline" onclick="loadLog()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
      <button class="btn btn-red" onclick="clearLog()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        Clear Log
      </button>
    </div>
  </div>

  <!-- Timeline -->
  <div id="timeline"></div>
</div>

<script>
// ── BG Canvas ─────────────────────────────────────────────────────────────
const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
let BW,BH,bps=[];
function brsz(){BW=bgC.width=window.innerWidth;BH=bgC.height=window.innerHeight;}
window.addEventListener('resize',()=>{brsz();binit();});brsz();
class BP{constructor(){this.r(true);}r(i=false){this.x=Math.random()*BW;this.y=i?Math.random()*BH:-10;this.vx=(Math.random()-.5)*.28;this.vy=Math.random()*.32+.07;this.rad=Math.random()*2+.5;this.a=Math.random()*.15+.05;this.h=Math.random()>.5?'67,97,238':'114,9,183';}u(){this.x+=this.vx;this.y+=this.vy;if(this.y>BH+10)this.r();}d(){bgX.save();bgX.globalAlpha=this.a;bgX.fillStyle=`rgba(${this.h},1)`;bgX.beginPath();bgX.arc(this.x,this.y,this.rad,0,Math.PI*2);bgX.fill();bgX.restore();}}
function binit(){bps=[];for(let i=0;i<60;i++)bps.push(new BP());}binit();
function blog(){bgX.clearRect(0,0,BW,BH);bgX.save();bgX.strokeStyle='rgba(67,97,238,0.03)';bgX.lineWidth=1;for(let x=0;x<BW;x+=60){bgX.beginPath();bgX.moveTo(x,0);bgX.lineTo(x,BH);bgX.stroke();}for(let y=0;y<BH;y+=60){bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(BW,y);bgX.stroke();}bgX.restore();for(let i=0;i<bps.length;i++)for(let j=i+1;j<bps.length;j++){const dx=bps[i].x-bps[j].x,dy=bps[i].y-bps[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){bgX.save();bgX.globalAlpha=(1-d/100)*.06;bgX.strokeStyle='rgba(67,97,238,1)';bgX.lineWidth=.5;bgX.beginPath();bgX.moveTo(bps[i].x,bps[i].y);bgX.lineTo(bps[j].x,bps[j].y);bgX.stroke();bgX.restore();}}bps.forEach(p=>{p.u();p.d();});requestAnimationFrame(blog);}blog();

// ── State ─────────────────────────────────────────────────────────────────
let allLog    = [];
let activeFilter = '';

const ACTION_ICONS = {
  REGISTER:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>',
  ATTENDANCE: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg>',
  OVERRIDE:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  UPDATE:     '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  DELETE:     '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/></svg>',
  CLEAR:      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.49"/></svg>',
  LOGIN:      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>'
};

// ── Load ──────────────────────────────────────────────────────────────────
async function loadLog() {
  try {
    const res  = await fetch('/api/activity?limit=500');
    const data = await res.json();
    allLog = data.log || [];
    updateCounts();
    renderLog();
  } catch(e) {
    document.getElementById('timeline').innerHTML =
      '<div class="empty-state"><p>Failed to load — is Flask running?</p></div>';
  }
}

function updateCounts() {
  const actions = ['all','REGISTER','ATTENDANCE','OVERRIDE','UPDATE','DELETE','CLEAR','LOGIN'];
  actions.forEach(a => {
    const cnt = a === 'all' ? allLog.length :
                allLog.filter(l => l.action === a).length;
    const el = document.getElementById('cnt-' + a.toLowerCase());
    if (el) el.textContent = cnt;
  });
}

// ── Filter chips ──────────────────────────────────────────────────────────
function setFilter(action, el) {
  activeFilter = action;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderLog();
}

// ── Render timeline ───────────────────────────────────────────────────────
function renderLog() {
  const q = document.getElementById('search-inp').value.trim().toLowerCase();

  let entries = allLog;
  if (activeFilter) entries = entries.filter(l => l.action === activeFilter);
  if (q) entries = entries.filter(l =>
    (l.details||'').toLowerCase().includes(q) ||
    (l.action ||'').toLowerCase().includes(q)
  );

  document.getElementById('showing-lbl').textContent = `${entries.length} entries`;

  if (!entries.length) {
    document.getElementById('timeline').innerHTML = `
      <div class="empty-state">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>No activity found</p>
      </div>`;
    return;
  }

  // Group by date
  const groups = {};
  entries.forEach(entry => {
    const date = (entry.timestamp || '').slice(0, 10);
    if (!groups[date]) groups[date] = [];
    groups[date].push(entry);
  });

  const datesSorted = Object.keys(groups).sort((a,b) => b.localeCompare(a));
  const today     = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);

  document.getElementById('timeline').innerHTML = datesSorted.map(date => {
    const label = date === today ? 'Today' :
                  date === yesterday ? 'Yesterday' : date;

    const rows = groups[date].map(entry => {
      const time    = (entry.timestamp || '').slice(11, 19);
      const action  = entry.action || '';
      const icon    = ACTION_ICONS[action] || ACTION_ICONS['CLEAR'];

      return `
        <div class="tl-entry">
          <div class="tl-icon ${action}">${icon}</div>
          <div class="tl-body">
            <div class="tl-action-row">
              <span class="tl-badge ${action}">${action}</span>
            </div>
            <div class="tl-details">${entry.details || ''}</div>
          </div>
          <div class="tl-time">${time}</div>
        </div>`;
    }).join('');

    return `
      <div class="tl-group">
        <div class="tl-date-label">${label}</div>
        ${rows}
      </div>`;
  }).join('');
}

// ── Clear log ─────────────────────────────────────────────────────────────
async function clearLog() {
  if (!confirm('Clear the entire activity log? This cannot be undone.')) return;
  await fetch('/api/activity/clear', { method: 'POST' });
  loadLog();
}

loadLog();
// Auto-refresh every 10s
setInterval(loadLog, 10000);
</script>
