<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FaceTrack — Session Not Active</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0f4ff;--surface:#fff;--accent:#4361ee;--accent2:#7209b7;--accent3:#06d6a0;--danger:#ef4444;--text:#1a1f3c;--muted:#6b7280;--border:rgba(67,97,238,0.14);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;cursor:default;display:flex;align-items:center;justify-content:center;}
#bg-canvas{position:fixed;inset:0;z-index:0;}
.card{position:relative;z-index:10;background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:52px 48px;width:100%;max-width:460px;text-align:center;box-shadow:0 16px 48px rgba(67,97,238,0.12);animation:fadeUp 0.5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.icon{width:72px;height:72px;border-radius:18px;background:rgba(239,68,68,0.08);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
.title{font-size:1.5rem;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:10px;}
.sub{font-size:0.92rem;color:var(--muted);line-height:1.7;margin-bottom:32px;}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#b91c1c;font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;letter-spacing:1.5px;padding:8px 18px;border-radius:100px;margin-bottom:32px;}
.dot{width:7px;height:7px;background:#ef4444;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:var(--accent);color:#fff;font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;text-decoration:none;transition:all 0.25s;}
.back-btn:hover{background:#3451d1;transform:translateY(-2px);}
.refresh-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:transparent;color:var(--accent);font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:700;border:1.5px solid rgba(67,97,238,0.3);border-radius:10px;cursor:pointer;text-decoration:none;transition:all 0.25s;margin-left:12px;}
.refresh-btn:hover{background:rgba(67,97,238,0.06);transform:translateY(-2px);}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="card">
  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <div class="badge"><div class="dot"></div>SESSION CLOSED</div>
  <div class="title">Attendance not open yet</div>
  <div class="sub">The teacher has not started the attendance session. Please wait for your teacher to open the session and try again.</div>
  <a href="/" class="back-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Go Back
  </a>
  <a href="/attendance" class="refresh-btn" onclick="location.reload();return false;">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Try Again
  </a>
</div>
<script>
const cv=document.getElementById('bg-canvas'),cx=cv.getContext('2d');
let W,H,ps=[];
function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
window.addEventListener('resize',()=>{rsz();init();});rsz();
class P{constructor(){this.r(true);}r(i=false){this.x=Math.random()*W;this.y=i?Math.random()*H:-10;this.vx=(Math.random()-.5)*.28;this.vy=Math.random()*.32+.07;this.rad=Math.random()*2+.5;this.a=Math.random()*.12+.04;this.h='239,68,68';}u(){this.x+=this.vx;this.y+=this.vy;if(this.y>H+10)this.r();}d(){cx.save();cx.globalAlpha=this.a;cx.fillStyle=`rgba(${this.h},1)`;cx.beginPath();cx.arc(this.x,this.y,this.rad,0,Math.PI*2);cx.fill();cx.restore();}}
function init(){ps=[];for(let i=0;i<40;i++)ps.push(new P());}init();
function loop(){cx.clearRect(0,0,W,H);cx.save();cx.strokeStyle='rgba(67,97,238,0.03)';cx.lineWidth=1;for(let x=0;x<W;x+=60){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}for(let y=0;y<H;y+=60){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}cx.restore();ps.forEach(p=>{p.u();p.d();});requestAnimationFrame(loop);}loop();

// Auto-check every 10s if session opened
setInterval(async()=>{
  try{
    const res=await fetch('/api/session-state');
    const d=await res.json();
    if(d.active) window.location.href='/attendance';
  }catch(e){}
},10000);
</script>
</body>
</html>
