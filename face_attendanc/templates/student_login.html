<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FaceTrack — Student Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0f4ff;--surface:#fff;--surface2:#f7f9ff;--accent3:#06d6a0;--accent:#4361ee;--accent2:#7209b7;--text:#1a1f3c;--muted:#6b7280;--border:rgba(67,97,238,0.14);--shadow:0 4px 24px rgba(67,97,238,0.1);--glow-g:0 0 24px rgba(6,214,160,0.4),0 8px 32px rgba(6,214,160,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;cursor:default;display:flex;align-items:center;justify-content:center;}
#bg-canvas{position:fixed;inset:0;z-index:0;}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(240,244,255,0.9);}
.logo{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo svg{flex-shrink:0;}
.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-link{display:flex;align-items:center;gap:7px;font-size:0.82rem;font-weight:600;color:var(--muted);text-decoration:none;padding:7px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);transition:all 0.2s;}
.back-link:hover{color:var(--accent);border-color:rgba(67,97,238,0.3);}

.card{position:relative;z-index:10;background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 16px 48px rgba(67,97,238,0.14);animation:fadeUp 0.5s ease both;}
.card-icon{width:64px;height:64px;border-radius:16px;background:rgba(6,214,160,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;}
.card-title{font-size:1.6rem;font-weight:800;color:var(--text);text-align:center;letter-spacing:-0.5px;margin-bottom:6px;}
.card-sub{font-size:0.88rem;color:var(--muted);text-align:center;margin-bottom:36px;}

.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:0.75rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text);margin-bottom:8px;}
.input-wrap{position:relative;}
.input-wrap > svg:first-child{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.form-input{width:100%;padding:13px 14px 13px 42px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.form-input:focus{border-color:var(--accent3);box-shadow:0 0 0 3px rgba(6,214,160,0.15);}
.form-input::placeholder{color:#b0b9d0;}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--surface2);border:none;cursor:pointer;color:var(--muted);padding:5px 6px;border-radius:6px;display:flex;align-items:center;justify-content:center;line-height:1;z-index:2;}
.eye-btn:hover{color:var(--accent3);}

.btn-login{width:100%;padding:14px;background:var(--accent3);color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all 0.25s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-login:hover{background:#00b890;box-shadow:var(--glow-g);transform:translateY(-2px);}
.btn-login:disabled{opacity:0.5;transform:none;cursor:not-allowed;box-shadow:none;}

.alert{display:none;padding:12px 16px;border-radius:10px;font-size:0.86rem;font-weight:500;align-items:center;gap:9px;margin-top:14px;}
.alert.show{display:flex;}
.alert.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#b91c1c;}

.default-info{background:rgba(6,214,160,0.07);border:1px solid rgba(6,214,160,0.25);border-radius:10px;padding:12px 16px;margin-bottom:24px;font-size:0.82rem;color:#047857;text-align:center;}
.default-info strong{display:block;margin-bottom:2px;font-size:0.78rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}

.hint{text-align:center;margin-top:20px;font-size:0.8rem;color:var(--muted);}
.hint a{color:var(--accent);text-decoration:none;font-weight:600;}
.hint a:hover{text-decoration:underline;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<nav class="topbar">
  <div class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4361ee"/><stop offset="100%" stop-color="#7209b7"/></linearGradient></defs><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>Face<span>Track</span></div>
  <a href="/choose-login" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
</nav>

<div class="card">
  <div class="card-icon">🎓</div>
  <div class="card-title">Student Login</div>
  <div class="card-sub">View your personal attendance record</div>

  <div class="default-info">
    <strong>Default Password</strong>
    Your default password is your <b>Register Number</b>
  </div>

  <div class="form-group">
    <label class="form-label">Register Number</label>
    <div class="input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3h-8l-2 4h12z"/></svg>
      <input class="form-input" id="reg-number" type="text" placeholder="e.g. 22CS001" autocomplete="username"/>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input class="form-input" id="password" type="password" placeholder="Enter password"
             onkeydown="if(event.key==='Enter') login()"/>
      <button class="eye-btn" onclick="togglePwd()" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button class="btn-login" id="btn-login" onclick="login()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 3 21 3 21 9"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="7 17 21 3"/></svg>
    Sign In
  </button>
  <div class="alert error" id="alert"></div>
  <div class="hint"><a href="/choose-login">← Choose different role</a></div>
</div>

<script>
const cv=document.getElementById('bg-canvas'),cx=cv.getContext('2d');
let W,H,ps=[];
function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
window.addEventListener('resize',()=>{rsz();init();});rsz();
class P{constructor(){this.r(true);}r(i=false){this.x=Math.random()*W;this.y=i?Math.random()*H:-10;this.vx=(Math.random()-.5)*.3;this.vy=Math.random()*.35+.08;this.rad=Math.random()*2+.6;this.a=Math.random()*.18+.06;this.h=Math.random()>.5?'6,214,160':'67,97,238';}u(){this.x+=this.vx;this.y+=this.vy;if(this.y>H+10)this.r();}d(){cx.save();cx.globalAlpha=this.a;cx.fillStyle=`rgba(${this.h},1)`;cx.beginPath();cx.arc(this.x,this.y,this.rad,0,Math.PI*2);cx.fill();cx.restore();}}
function init(){ps=[];for(let i=0;i<70;i++)ps.push(new P());}init();
function loop(){cx.clearRect(0,0,W,H);cx.save();cx.strokeStyle='rgba(67,97,238,0.035)';cx.lineWidth=1;for(let x=0;x<W;x+=60){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}for(let y=0;y<H;y+=60){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}cx.restore();for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){cx.save();cx.globalAlpha=(1-d/110)*.07;cx.strokeStyle='rgba(67,97,238,1)';cx.lineWidth=.5;cx.beginPath();cx.moveTo(ps[i].x,ps[i].y);cx.lineTo(ps[j].x,ps[j].y);cx.stroke();cx.restore();}}ps.forEach(p=>{p.u();p.d();});requestAnimationFrame(loop);}loop();

function togglePwd(){const inp=document.getElementById('password');inp.type=inp.type==='password'?'text':'password';}

async function login(){
  const reg=document.getElementById('reg-number').value.trim();
  const pwd=document.getElementById('password').value;
  if(!reg||!pwd){showAlert('Please enter register number and password.');return;}
  const btn=document.getElementById('btn-login');
  btn.disabled=true;
  btn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Signing in…`;
  try{
    const res=await fetch('/api/student-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reg_number:reg,password:pwd})});
    const data=await res.json();
    if(data.success){window.location.href=data.redirect;}
    else{showAlert(data.message||'Login failed.');}
  }catch(e){showAlert('Server error — is Flask running?');}
  btn.disabled=false;
  btn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 3 21 3 21 9"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="7 17 21 3"/></svg> Sign In`;
}
function showAlert(msg){const el=document.getElementById('alert');el.className='alert error show';el.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${msg}`;}
const s=document.createElement('style');s.textContent='@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';document.head.appendChild(s);
</script>
</body>
</html>
